<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>HAven</title>

  <!-- Version stamp - bump this to bust browser cache on all devices -->
  <script>var HAVEN_VERSION = '0.6.8';</script>

  <!-- Assets loaded with version query string for cache busting -->
  <script>
    (function() {
      var v = '?v=' + HAVEN_VERSION;
      var css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'style.css' + v;
      var mdi = document.createElement('link'); mdi.rel = 'stylesheet'; mdi.href = 'fonts/materialdesignicons.css'; document.head.appendChild(mdi);
      document.head.appendChild(css);

      // Font loaded via @font-face in style.css with font-display: block
    })();
  </script>
</head>
<body>
  <!-- Hidden element to force FontAwesome to load immediately -->
  <span class="fa-preload" aria-hidden="true"></span>

  <!-- Setup overlay - shown when no credentials are stored -->
  <div id="setup-overlay" class="hidden">
    <div id="setup-box">
      <div id="setup-logo">HAven</div>
      <p>Enter your Home Assistant details to get started.</p>
      <label>Home Assistant URL
        <input type="text" id="setup-url" placeholder="http://homeassistant.local:8123" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </label>
      <label>Long-Lived Access Token
        <textarea id="setup-token" placeholder="Paste your token here..." rows="4"></textarea>
      </label>
      <button id="setup-save">Connect</button>
      <p id="setup-error"></p>
    </div>
  </div>

  <!-- Main dashboard canvas -->
  <div id="canvas-wrapper">
    <div id="canvas">
      <!-- Widgets injected here by app.js -->
    </div>
  </div>

  <!-- Connection status indicator -->
  <div id="conn-status" class="conn-disconnected" title="Connection status"></div>

  <!-- Page navigation dots -->
  <div id="page-nav"></div>

  <!-- App loaded last with version cache bust -->
  <script>
    (function() {
      var s = document.createElement('script');
      s.src = 'app.js?v=' + HAVEN_VERSION;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
