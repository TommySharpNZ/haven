<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>HAven</title>

  <!-- Version stamp - bump this to bust browser cache on all devices -->
  <script>var HAVEN_VERSION = '0.7.0';</script>

  <!-- Assets loaded with version query string for cache busting -->
  <script>
    (function() {
      var v = '?v=' + HAVEN_VERSION;
      var css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = 'style.css' + v;
      var mdi = document.createElement('link'); mdi.rel = 'stylesheet'; mdi.href = 'fonts/materialdesignicons.css'; document.head.appendChild(mdi);
      document.head.appendChild(css);

      // Font loaded via @font-face in style.css with font-display: block
    })();
  </script>
</head>
<body>
  <!-- Hidden element to force FontAwesome to load immediately -->
  <span class="fa-preload" aria-hidden="true"></span>

  <!-- Setup overlay - shown when no credentials are stored -->
  <div id="setup-overlay" class="hidden">
    <div id="setup-box">
      <div id="setup-logo">HAven</div>
      <p>Enter your Home Assistant details to get started.</p>
      <label>Home Assistant URL
        <input type="text" id="setup-url" placeholder="http://homeassistant.local:8123" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </label>
      <label>Long-Lived Access Token
        <textarea id="setup-token" placeholder="Paste your token here..." rows="4"></textarea>
      </label>
      <button id="setup-save">Connect</button>
      <p id="setup-error"></p>
      <div style="margin-top:18px;padding-top:16px;border-top:1px solid #2d3a4a;text-align:center;">
        <p style="font-size:12px;color:#6b7580;margin:0 0 10px;">HAven is free and open source. If it's running on a screen in your home, consider shouting me a coffee which keeps the project going.</p>
        <a href="https://buymeacoffee.com/tommysharpnz" target="_blank" rel="noopener">
          <img src="https://www.buymeacoffee.com/assets/img/custom_images/orange_img.png" alt="Buy Me A Coffee" style="height:32px;border-radius:6px;">
        </a>
        <br style="margin-bottom:6px;">
        <a href="https://github.com/TommySharpNZ/haven" target="_blank" rel="noopener">
          <img src="https://img.shields.io/badge/GitHub-TommySharpNZ%2Fhaven-181717?style=flat&logo=github" alt="GitHub" style="height:20px;border-radius:4px;margin-top:8px;">
        </a>
      </div>
    </div>
  </div>

  <!-- Main dashboard canvas -->
  <div id="canvas-wrapper">
    <div id="canvas">
      <!-- Widgets injected here by app.js -->
    </div>
  </div>

  <!-- Connection status indicator -->
  <div id="conn-status" class="conn-disconnected" title="Connection status"></div>

  <!-- Page navigation dots -->
  <div id="page-nav"></div>

  <!-- App loaded last with version cache bust -->
  <script>
    (function() {
      var s = document.createElement('script');
      s.src = 'app.js?v=' + HAVEN_VERSION;
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
